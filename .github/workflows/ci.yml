name: ci

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: "mysql://user:password@localhost:3306/glhf"
          NEXTAUTH_SECRET: "ci-secret-placeholder"
          PAYPAL_CLIENT_ID: "ci-placeholder"
          PAYPAL_CLIENT_SECRET: "ci-placeholder"
          PAYPAL_BASE_URL: "https://api-m.sandbox.paypal.com"
          PAYPAL_WEBHOOK_ID: "ci-placeholder"
